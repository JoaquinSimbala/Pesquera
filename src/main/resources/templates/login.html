<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquera - Inicio de Sesion</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <header class="page-header">
        <h1>Sistema Pesquero</h1>
        <p>Acceso a modulos operativos</p>
    </header>

    <main>
        <div class="login-container">
            <h2>Iniciar Sesión</h2>
            <p class="login-subtitle">Ingresa con tus credenciales corporativas</p>

            <div th:if="${param.error}" class="alert alert-error" role="alert">
                Usuario o contraseña incorrectos. Intenta nuevamente.
            </div>

            <div th:if="${param.logout}" class="alert alert-success" role="status">
                Sesión cerrada correctamente.
            </div>

            <form id="loginForm" method="post" th:action="@{/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <label for="username">Usuario:</label>
                <input id="username" type="text" name="username" autocomplete="username" required>

                <label for="password">Contraseña:</label>
                <input id="password" type="password" name="password" autocomplete="current-password" required>

                <p id="loginError" class="field-error" aria-live="polite"></p>

                <button type="submit">Ingresar</button>
            </form>
        </div>
    </main>

    <footer class="page-footer">
        <small>Pesquera - Plataforma interna</small>
    </footer>

    <script th:src="@{/js/login.js}"></script>
</body>
</html>
