<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layouts/panel :: layout('Panel Supervisor - Inventario', ~{::styles}, ~{::content}, ~{::scripts})}">
<th:block th:fragment="styles">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</th:block>
<th:block th:fragment="content">
    <main class="container">
        <h2 class="panel-title">Módulo 05: Inventario y Distribución</h2>

        <section class="panel-section">
            <h3 class="section-title">Métricas de Despacho</h3>
            <div class="grid" style="grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem;">
                <div style="background: #e0f2f1; padding: 1.5rem; border-radius: 8px; text-align: center; border: 1px solid #b2dfdb;">
                    <strong style="color: #0c7c6f;">Canal Moderno (Supermercados)</strong><br>
                    <span style="font-size: 1.2rem; font-weight: bold;" th:text="${#numbers.formatDecimal(metricas['Supermercados'], 1, 2)} + ' kg'"></span>
                </div>
                <div style="background: #e0f2f1; padding: 1.5rem; border-radius: 8px; text-align: center; border: 1px solid #b2dfdb;">
                    <strong style="color: #0c7c6f;">Terminal Mayorista</strong><br>
                    <span style="font-size: 1.2rem; font-weight: bold;" th:text="${#numbers.formatDecimal(metricas['Mercado Mayorista'], 1, 2)} + ' kg'"></span>
                </div>
                <div style="background: #e0f2f1; padding: 1.5rem; border-radius: 8px; text-align: center; border: 1px solid #b2dfdb;">
                    <strong style="color: #0c7c6f;">Mercado Exterior (Exportación)</strong><br>
                    <span style="font-size: 1.2rem; font-weight: bold;" th:text="${#numbers.formatDecimal(metricas['Exportacion'], 1, 2)} + ' kg'"></span>
                </div>
            </div>
        </section>

        <section class="panel-section">
            <h3 class="section-title">Registrar Lote Terminado</h3>
            <form th:action="@{/supervisor/registrar}" th:object="${inventarioForm}" method="post" class="grid">

                <div class="form-group">
                    <label for="loteReferencia">Código de Lote / Guía:</label>
                    <input type="text" id="loteReferencia" th:field="*{loteReferencia}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('loteReferencia')}" th:errors="*{loteReferencia}"></p>
                </div>

                <div class="form-group">
                    <label for="kilosTotales">Volumen a Distribuir (kg):</label>
                    <input type="number" id="kilosTotales" th:field="*{kilosTotales}" step="0.01" min="0.1" required>
                    <p class="field-error" th:if="${#fields.hasErrors('kilosTotales')}" th:errors="*{kilosTotales}"></p>
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="destino">Destino Operativo:</label>
                    <select id="destino" th:field="*{destino}" required>
                        <option value="">Seleccione ruta de despacho...</option>
                        <option value="Supermercados">Supermercados</option>
                        <option value="Mercado Mayorista">Mercado Mayorista</option>
                        <option value="Exportacion">Exportacion</option>
                    </select>
                    <p class="field-error" th:if="${#fields.hasErrors('destino')}" th:errors="*{destino}"></p>
                </div>

                <button type="submit" class="btn-calc">Procesar Distribución</button>
            </form>
        </section>

        <section class="panel-section">
            <h3 class="section-title">Historial General de Envíos</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Lote Ref.</th>
                        <th>Kilos</th>
                        <th>Destino Asignado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="inv : ${historial}">
                        <td th:text="${inv.fechaRegistro}"></td>
                        <td th:text="${inv.loteReferencia}"></td>
                        <td th:text="${#numbers.formatDecimal(inv.kilosTotales, 1, 2)}"></td>
                        <td><span class="status-ok" th:text="${inv.destino}"></span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</th:block>
<th:block th:fragment="scripts">
</th:block>
</html>
